# Site settings
title: 7heAnsw3r
description: >-
  Penetration testing research, Active Directory exploitation, malware development and offensive tool engineering.
  Write-ups, TTPs and technical deep-dives by Anthony Contreras — CPTS | CAPE | eJPT | HTB ProLabs | MalDev.
  Read more at <a href="https://7heansw3r.github.io" target="_blank" rel="noopener">7heAnsw3r</a>.
lang: en-US
timezone: America/Guayaquil
image: assets/img/Avatar_hacker.png
repo: https://github.com/7heAnsw3r/7heAnsw3r.github.io
mode: dark

# Profile settings
author: 
  name: 7heAnsw3r
  bio: >-
    Penetration Tester · CPTS · CAPE · eJPT · MalDev · HTB ProLabs: Offshore, Wutai, Ifrit · Building offensive tooling for x86_64 & ARM
  username: 7heAnsw3r
  github: 7heAnsw3r
  twitter: TheAnsw3r
  linkedin: 4n7hony
  avatar: /assets/img/Avatar_hacker.png


# URL settings
url: "https://7heAnsw3r.github.io" #
#baseurl:
permalink: /:title/
google_analytics: G-9HB9JG04HN # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 8

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles